<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض المحمي ضد السرقات</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            user-select: none; /* منع التحديد */
            -webkit-user-select: none;
        }

        /* الحاوية الرئيسية */
        .image-container {
            position: relative;
            width: 80%;
            max-width: 700px;
            border: 5px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            background: #000;
            transition: filter 0.3s ease; /* تأثير الغلوشة */
        }

        /* طبقة الصورة الأصلية */
        .main-image {
            display: block;
            width: 100%;
            pointer-events: none; /* منع التعامل مع الصورة مباشرة */
        }

        /* الخدعة: الطبقة الشفافة العازلة */
        .overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0); /* شفافة تماماً */
        }

        /* العلامة المائية الثابتة */
        .watermark-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            z-index: 5;
            pointer-events: none;
            opacity: 0.2;
        }
        .watermark-grid span {
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(-45deg);
            font-size: 14px;
        }

        /* تأثير الغلوشة (Blur) */
        .protected-blur {
            filter: blur(40px) grayscale(100%);
        }

        /* رسالة تحذير تظهر عند الغلوشة */
        .warning-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(255, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 100;
            font-weight: bold;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="image-container" id="secureBox">
    <div class="warning-msg" id="warning">ممنوع التصوير أو الخروج من الصفحة!</div>
    
    <!-- الطبقة العازلة -->
    <div class="overlay-layer"></div>
    
    <!-- شبكة علامات مائية -->
    <div class="watermark-grid">
        <span>PROPERTY OF [YOUR NAME]</span><span>PROPERTY OF [YOUR NAME]</span><span>PROPERTY OF [YOUR NAME]</span>
        <span>PROPERTY OF [YOUR NAME]</span><span>PROPERTY OF [YOUR NAME]</span><span>PROPERTY OF [YOUR NAME]</span>
    </div>

    <!-- الصورة المراد حمايتها -->
    <!-- استبدل الرابط برابط صورتك -->
    <img src="02f31951-f4c0-4eda-a2c0-37ec3bb6b926.jpg" alt="Protected" class="main-image" id="targetImage">
</div>

<script>
    const box = document.getElementById('secureBox');
    const warning = document.getElementById('warning');

    // 1. خدعة الغلوشة عند فقدان التركيز (أهم خدعة ضد برامج السكرين شوت)
    window.addEventListener('blur', () => {
        box.classList.add('protected-blur');
        warning.style.display = 'block';
    });

    window.addEventListener('focus', () => {
        box.classList.remove('protected-blur');
        warning.style.display = 'none';
    });

    // 2. منع اختصارات لوحة المفاتيح
    document.addEventListener('keydown', function(e) {
        // منع F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+P
        if (
            e.keyCode === 123 || 
            (e.ctrlKey && e.shiftKey && e.keyCode === 73) || 
            (e.ctrlKey && e.keyCode === 85) || 
            (e.ctrlKey && e.keyCode === 83) || 
            (e.ctrlKey && e.keyCode === 80)
        ) {
            e.preventDefault();
            alert('عذراً.. الحماية مفعلة!');
            return false;
        }
    });

    // 3. منع سحب الصورة (Drag and Drop)
    document.addEventListener('dragstart', (e) => e.preventDefault());

    // 4. خدعة إضافية: لو فتح الـ Console المتصفح هيمسح المحتوى (اختياري)
    setInterval(() => {
        if(window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
            document.body.innerHTML = "<h1>تم اكتشاف محاولة سرقة!</h1>";
        }
    }, 1000);
</script>

</body>
</html>
