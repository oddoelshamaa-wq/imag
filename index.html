<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معرض الصور المحمي</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* حاوية الصورة */
        .image-container {
            position: relative;
            width: 95vw;
            height: 60vh;
            border: 1px solid #333;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #protectedImg {
            max-width: 100%;
            max-height: 100%;
            display: none; /* مخفية افتراضياً */
            pointer-events: none;
        }

        /* نقاط اللمس */
        .touch-point {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            z-index: 10;
            transition: background 0.3s;
        }

        .point-1 { top: 10px; right: 10px; }
        .point-2 { bottom: 10px; left: 10px; }

        .active-point { background: rgba(0, 255, 0, 0.4) !important; }

        /* رسالة التعليمات */
        #msg {
            position: absolute;
            text-align: center;
            color: #888;
        }

        /* علامة مائية متحركة لتخريب السكرين شوت */
        .watermark {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            display: none;
            z-index: 5;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 50px);
        }

        .user-tag {
            position: absolute;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            white-space: nowrap;
        }

        .controls { margin-top: 30px; display: flex; gap: 20px; }
        button { padding: 10px 20px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }

        /* حالة السكرين شوت المكتشفة */
        #warning {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: red; color: white;
            display: none; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; z-index: 9999;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="warning">⚠️ تم رصد محاولة تصوير!</div>

    <div style="margin-bottom: 10px; font-size: 14px; color: #ffeb3b;">
        للعرض: ضع إصبعك الأول على (1) والثاني على (2) معاً
    </div>

    <div class="image-container" id="box">
        <div id="msg">الصورة محمية.. استخدم اللمس المزدوج</div>
        
        <div class="touch-point point-1" id="p1">1</div>
        <div class="touch-point point-2" id="p2">2</div>

        <img src="" id="protectedImg">
        <div class="watermark" id="wm"></div>
    </div>

    <div class="controls">
        <button onclick="changeImg(-1)">السابق</button>
        <button onclick="changeImg(1)">التالي</button>
    </div>

    <script>
        const images = [
            '02ea532c-f58e-4300-bb72-258f0366e0e1.jpg',
            '9471537d-8d94-4841-bb65-2c370ac89dfd.jpg',
            '4709ec03-9528-4d20-a416-2ba9e6832fca.jpg',
             '02f31951-f4c0-4eda-a2c0-37ec3bb6b926.jpg'
        ];
        let current = 0;

        const img = document.getElementById('protectedImg');
        const p1 = document.getElementById('p1');
        const p2 = document.getElementById('p2');
        const wm = document.getElementById('wm');
        const warning = document.getElementById('warning');

        let isP1Active = false;
        let isP2Active = false;

        function updateState() {
            if (isP1Active && isP2Active) {
                img.style.display = 'block';
                wm.style.display = 'block';
            } else {
                img.style.display = 'none';
                wm.style.display = 'none';
            }
        }

        // دالة لتغيير الصور
        function changeImg(dir) {
            current = (current + dir + images.length) % images.length;
            img.src = images[current];
        }
        changeImg(0);

        // التعامل مع اللمس
        const handleTouch = (e) => {
            isP1Active = false;
            isP2Active = false;
            p1.classList.remove('active-point');
            p2.classList.remove('active-point');

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                
                if (el === p1) { isP1Active = true; p1.classList.add('active-point'); }
                if (el === p2) { isP2Active = true; p2.classList.add('active-point'); }
            }
            updateState();
        };

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        window.addEventListener('touchend', () => {
            isP1Active = false; isP2Active = false;
            p1.classList.remove('active-point'); p2.classList.remove('active-point');
            updateState();
        });

        // كشف الاسكرين شوت عن طريق مراقبة التركيز
        window.onblur = function() {
            img.style.display = 'none';
            warning.style.display = 'flex';
            setTimeout(() => { warning.style.display = 'none'; }, 2000);
        };

        // منع الأزرار والاختصارات
        document.addEventListener('keydown', e => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 'p')) {
                e.preventDefault();
                alert('المحتوى محمي!');
            }
        });

        // توليد علامات مائية عشوائية
        for(let i=0; i<20; i++) {
            let span = document.createElement('span');
            span.className = 'user-tag';
            span.innerText = 'PRIVATE CONTENT - ' + new Date().toLocaleDateString();
            span.style.top = Math.random() * 100 + '%';
            span.style.left = Math.random() * 100 + '%';
            wm.appendChild(span);
        }

    </script>
</body>
</html>
